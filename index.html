<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drohnen Steuerung</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  :root {
    --bg:     #0c0e14;
    --bg2:    #161a26;
    --bg3:    #1d2235;
    --border: rgba(255,255,255,0.07);
    --text:   #dde2ee;
    --dim:    #707b93;
    --accent: #3b82f6;
    --aglow:  rgba(59,130,246,0.4);
    --green:  #22c55e;
    --gglow:  rgba(34,197,94,0.3);
    --red:    #ef4444;
    --rglow:  rgba(239,68,68,0.3);
    --yellow: #f59e0b;
    --font:   'Courier New', Courier, monospace;
    --bs: clamp(52px, 10vw, 76px);
    --r: 12px;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100dvh;
    overflow: hidden;
  }

  /* Portrait warning */
  .portrait-warn {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 30px;
  }
  .portrait-warn .icon { font-size: 52px; animation: rot-hint 2.4s ease-in-out infinite; }
  @keyframes rot-hint {
    0%,30%,100% { transform: rotate(0deg); }
    55%,85%     { transform: rotate(90deg); }
  }
  .portrait-warn strong { color: var(--text); font-size: 15px; letter-spacing: 0.08em; display: block; }
  .portrait-warn p { color: var(--dim); font-size: 13px; letter-spacing: 0.04em; margin: 0; }

  @media (orientation: portrait) {
    .portrait-warn { display: flex; }
    .app { display: none !important; }
  }

  /* App shell */
  .app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 5px 8px;
    gap: 5px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 12px;
    background: var(--bg2);
    border-radius: var(--r);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .s-item { display: flex; align-items: center; gap: 5px; }
  .s-label { font-size: 9px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .s-val { font-size: 11px; font-weight: 700; }
  .s-val.ok   { color: var(--green); }
  .s-val.warn { color: var(--yellow); }
  .s-val.err  { color: var(--red); }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--gglow);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .sep { width: 1px; height: 14px; background: var(--border); }

  /* Main grid */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    min-height: 0;
  }

  /* Side panels */
  .left-panel, .right-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .panel-label { font-size: 9px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .vsep { width: 55%; height: 1px; background: var(--border); }
  .rot-row { display: flex; gap: 5px; }

  /* Buttons */
  .btn {
    width: var(--bs);
    height: var(--bs);
    border-radius: var(--r);
    border: 1.5px solid rgba(59,130,246,0.28);
    background: linear-gradient(145deg, #1a2240, #111828);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: clamp(17px, 3.8vw, 26px);
    color: #93c5fd;
    position: relative; overflow: hidden;
    transition: border-color 0.08s, box-shadow 0.08s, transform 0.07s, background 0.08s;
    touch-action: none;
    box-shadow: 0 0 8px rgba(59,130,246,0.1), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(147,197,253,0.2), transparent 70%);
    opacity: 0;
    transition: opacity 0.08s;
  }
  .btn.pressed {
    background: linear-gradient(145deg, #2a4a80, #1e3060);
    border-color: var(--accent);
    box-shadow: 0 0 24px var(--aglow), inset 0 0 14px rgba(59,130,246,0.22);
    transform: scale(0.87);
    color: #e0f0ff;
  }
  .btn.pressed::after { opacity: 1; }

  .btn.tall { height: calc(var(--bs) * 1.3); }
  .btn.sm {
    width:  calc(var(--bs) * 0.76);
    height: calc(var(--bs) * 0.76);
    font-size: clamp(15px, 3.2vw, 21px);
  }

  /* D-pad */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, var(--bs));
    grid-template-rows: repeat(3, var(--bs));
    gap: 5px;
  }
  .ghost {
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .stop-lbl { font-size: 8px; color: var(--dim); letter-spacing: 0.06em; }

  /* Center */
  .center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    padding: 0 4px;
  }

  /* Telemetry */
  .tele {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: 100%;
  }
  .tele-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 7px 5px 5px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .tele-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .tele-val { font-size: clamp(12px, 2.5vw, 17px); font-weight: 700; color: var(--text); }
  .tele-key { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; }

  /* Shutdown */
  .shutdown-btn {
    width: 100%; padding: 10px 0;
    border-radius: var(--r);
    border: 1.5px solid rgba(239,68,68,0.32);
    background: linear-gradient(145deg, #2a1515, #180d0d);
    color: #fca5a5;
    font-family: var(--font);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: all 0.1s;
    touch-action: none;
    box-shadow: 0 0 8px rgba(239,68,68,0.07);
  }
  .shutdown-btn.on {
    border-color: var(--red);
    color: #ef4444;
    box-shadow: 0 0 18px var(--rglow);
    background: linear-gradient(145deg, #3d1010, #250808);
  }
  .stop-sq { width: 10px; height: 10px; background: currentColor; border-radius: 2px; flex-shrink: 0; }

  .log {
    font-size: 10px; color: var(--dim);
    text-align: center; letter-spacing: 0.04em;
    min-height: 14px; width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 8px;
  }
</style>
</head>
<body>

<div class="portrait-warn">
  <div class="icon">📱</div>
  <strong>Handy drehen!</strong>
  <p>Diese Steuerung ist für den<br>Querformat-Modus ausgelegt.</p>
</div>

<div class="app">

  <div class="status-bar">
    <div class="s-item">
      <span class="conn-dot"></span>
      <span class="s-label">Status</span>
      <span class="s-val ok">Verbunden</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Akku</span>
      <span class="s-val ok" id="battery">87%</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Signal</span>
      <span class="s-val ok">▂▄▆█</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Modus</span>
      <span class="s-val" style="color:var(--text)">Manuell</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Motoren</span>
      <span class="s-val ok" id="motor-status">Aktiv</span>
    </div>
  </div>

  <div class="main">

    <!-- LINKS: Höhe + Rotation -->
    <div class="left-panel">
      <span class="panel-label">Höhe</span>
      <button class="btn tall" id="up-btn">▲</button>
      <button class="btn tall" id="down-btn">▼</button>
      <div class="vsep"></div>
      <span class="panel-label">Rotation</span>
      <div class="rot-row">
        <button class="btn sm" id="rotl-btn">↺</button>
        <button class="btn sm" id="rotr-btn">↻</button>
      </div>
    </div>

    <!-- MITTE: Telemetrie + Shutdown -->
    <div class="center-panel">
      <div class="tele">
        <div class="tele-card">
          <div class="tele-val" id="alt-display">0 m</div>
          <div class="tele-key">Höhe</div>
        </div>
        <div class="tele-card">
          <div class="tele-val" id="speed-display">0 km/h</div>
          <div class="tele-key">Geschw.</div>
        </div>
        <div class="tele-card">
          <div class="tele-val" id="heading-display">0°</div>
          <div class="tele-key">Richtung</div>
        </div>
      </div>
      <button class="shutdown-btn" id="shutdown-btn">
        <span class="stop-sq"></span>
        <span id="shutdown-label">Motoren AUS</span>
      </button>
      <div class="log" id="log">Bereit</div>
    </div>

    <!-- RECHTS: Richtung -->
    <div class="right-panel">
      <span class="panel-label">Richtung</span>
      <div class="dpad">
        <div class="ghost"></div>
        <button class="btn" id="fwd-btn">▲</button>
        <div class="ghost"></div>
        <button class="btn" id="left-btn">◀</button>
        <div class="ghost"><span class="stop-lbl">STOP</span></div>
        <button class="btn" id="right-btn">▶</button>
        <div class="ghost"></div>
        <button class="btn" id="back-btn">▼</button>
        <div class="ghost"></div>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  document.addEventListener('contextmenu', function (e) { e.preventDefault(); }, { passive: false });

  var state = { alt: 0, speed: 0, heading: 0, motors: true, active: null, interval: null };
  var cmds = {
    fwd:  { label: 'Vorwärts',  speed: 12 },
    back: { label: 'Rückwärts', speed: 8  },
    left: { label: 'Links',     speed: 6  },
    right:{ label: 'Rechts',    speed: 6  },
    up:   { label: 'Steigen',   alt: 1    },
    down: { label: 'Sinken',    alt: -1   },
    rotl: { label: 'Drehen L',  rot: -6   },
    rotr: { label: 'Drehen R',  rot: 6    },
  };

  ['fwd','back','left','right','up','down','rotl','rotr'].forEach(function (id) {
    var el = document.getElementById(id + '-btn');
    if (!el) return;
    el.addEventListener('touchstart',  function (e) { e.preventDefault(); startCmd(id); }, { passive: false });
    el.addEventListener('touchend',    function (e) { e.preventDefault(); stopCmd(); },    { passive: false });
    el.addEventListener('touchcancel', function (e) { e.preventDefault(); stopCmd(); },    { passive: false });
    el.addEventListener('pointerdown',  function (e) { if (e.pointerType !== 'touch') startCmd(id); });
    el.addEventListener('pointerup',    function (e) { if (e.pointerType !== 'touch') stopCmd(); });
    el.addEventListener('pointerleave', function (e) { if (e.pointerType !== 'touch') stopCmd(); });
    el.addEventListener('selectstart',  function (e) { e.preventDefault(); });
  });

  var shutEl = document.getElementById('shutdown-btn');
  shutEl.addEventListener('touchstart', function (e) { e.preventDefault(); }, { passive: false });
  shutEl.addEventListener('touchend',   function (e) { e.preventDefault(); toggleShutdown(); }, { passive: false });
  shutEl.addEventListener('click',      function ()  { if (!('ontouchstart' in window)) toggleShutdown(); });

  function startCmd(cmd) {
    if (!state.motors) return;
    stopCmd();
    state.active = cmd;
    var el = document.getElementById(cmd + '-btn');
    if (el) el.classList.add('pressed');
    setLog(cmds[cmd].label + ' ...');
    tick(cmd);
    state.interval = setInterval(function () { tick(cmd); }, 120);
  }

  function stopCmd() {
    if (state.active) {
      var el = document.getElementById(state.active + '-btn');
      if (el) el.classList.remove('pressed');
    }
    clearInterval(state.interval);
    state.interval = null;
    state.active = null;
    state.speed = 0;
    updateTele();
    if (state.motors) setLog('Bereit');
  }

  function tick(cmd) {
    var c = cmds[cmd];
    if (c.alt   !== undefined) { state.alt     = Math.max(0, Math.min(120, state.alt + c.alt)); state.speed = 3; }
    if (c.speed !== undefined) { state.speed   = c.speed; }
    if (c.rot   !== undefined) { state.heading = ((state.heading + c.rot) % 360 + 360) % 360; }
    updateTele();
  }

  function updateTele() {
    document.getElementById('alt-display').textContent     = state.alt     + ' m';
    document.getElementById('speed-display').textContent   = state.speed   + ' km/h';
    document.getElementById('heading-display').textContent = state.heading + '°';
  }

  function toggleShutdown() {
    state.motors = !state.motors;
    stopCmd();
    var btn = document.getElementById('shutdown-btn');
    var lbl = document.getElementById('shutdown-label');
    var ms  = document.getElementById('motor-status');
    if (!state.motors) {
      btn.classList.add('on');
      lbl.textContent = 'Motoren EIN';
      ms.textContent  = 'Gestoppt';
      ms.className    = 's-val err';
      state.alt = 0; state.speed = 0;
      updateTele();
      setLog('⚠ Motoren gestoppt');
    } else {
      btn.classList.remove('on');
      lbl.textContent = 'Motoren AUS';
      ms.textContent  = 'Aktiv';
      ms.className    = 's-val ok';
      setLog('Motoren aktiv — Bereit');
    }
  }

  function setLog(msg) { document.getElementById('log').textContent = msg; }

  setInterval(function () {
    var el = document.getElementById('battery');
    var b  = parseInt(el.textContent);
    if (state.motors && b > 5) {
      b = Math.max(5, b - 1);
      el.textContent = b + '%';
      el.className   = 's-val' + (b < 20 ? ' err' : b < 40 ? ' warn' : ' ok');
    }
  }, 30000);
})();
</script>
</body>
</html>
