
<style>
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .wrap { font-family: var(--font-mono, monospace); padding: 10px 14px; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); margin-bottom: 10px; }
  .s-item { display: flex; align-items: center; gap: 6px; }
  .s-label { font-size: 10px; color: var(--color-text-tertiary); letter-spacing: 0.07em; text-transform: uppercase; }
  .s-val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .s-val.ok { color: #3B6D11; }
  .s-val.warn { color: #854F0B; }
  .s-val.err { color: #A32D2D; }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #3B6D11; display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .sep { width: 1px; height: 18px; background: var(--color-border-tertiary); }

  .main { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; }

  .left-panel, .right-panel { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .panel-label { font-size: 10px; color: var(--color-text-tertiary); letter-spacing: 0.07em; text-transform: uppercase; }

  :root { --b: 68px; }
  .btn { width: var(--b); height: var(--b); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.08s, transform 0.07s; font-size: 22px; color: var(--color-text-primary); font-family: var(--font-mono); }
  .btn:active, .btn.pressed { background: var(--color-background-tertiary); transform: scale(0.91); border-color: var(--color-border-primary); }
  .btn.tall { height: calc(var(--b) * 1.15); }
  .btn.wide { width: calc(var(--b) * 2.3); height: calc(var(--b) * 0.75); font-size: 13px; font-weight: 500; letter-spacing: 0.06em; }

  .dpad { display: grid; grid-template-columns: repeat(3, var(--b)); grid-template-rows: repeat(3, var(--b)); gap: 7px; }
  .dpad .empty { background: none; border: none; pointer-events: none; }
  .dpad .center-lbl { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 0.05em; cursor: default; pointer-events: none; }

  .center-panel { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .tele { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; width: 100%; }
  .tele-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 7px 8px; text-align: center; }
  .tele-val { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .tele-key { font-size: 10px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; }

  .shutdown-btn { width: 100%; padding: 12px 0; border-radius: var(--border-radius-md); border: 1.5px solid #A32D2D; background: #FCEBEB; color: #A32D2D; font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.12s, transform 0.08s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .shutdown-btn:active { transform: scale(0.98); }
  .shutdown-btn.on { background: #A32D2D; color: #FCEBEB; }
  @media (prefers-color-scheme: dark) {
    .shutdown-btn { background: #501313; border-color: #E24B4A; color: #F7C1C1; }
    .shutdown-btn.on { background: #E24B4A; color: #501313; }
  }
  .stop-sq { width: 12px; height: 12px; background: currentColor; border-radius: 2px; flex-shrink: 0; }
  .log { font-size: 11px; color: var(--color-text-tertiary); text-align: center; letter-spacing: 0.04em; min-height: 15px; }
  .rot-row { display: flex; gap: 7px; }
</style>

<div class="wrap">

  <div class="status-bar">
    <div class="s-item">
      <span class="conn-dot"></span>
      <span class="s-label">Status</span>
      <span class="s-val ok">Verbunden</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Akku</span>
      <span class="s-val" id="battery">87%</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Signal</span>
      <span class="s-val ok">▂▄▆█</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Modus</span>
      <span class="s-val">Manuell</span>
    </div>
    <div class="sep"></div>
    <div class="s-item">
      <span class="s-label">Motoren</span>
      <span class="s-val ok" id="motor-status">Aktiv</span>
    </div>
  </div>

  <div class="main">

    <div class="left-panel">
      <span class="panel-label">Höhe</span>
      <button class="btn tall" id="up-btn" onpointerdown="startCmd('up')" onpointerup="stopCmd()" onpointerleave="stopCmd()">▲</button>
      <button class="btn tall" id="down-btn" onpointerdown="startCmd('down')" onpointerup="stopCmd()" onpointerleave="stopCmd()">▼</button>
      <div class="sep" style="width:40px;height:1px;background:var(--color-border-tertiary)"></div>
      <span class="panel-label">Rotation</span>
      <div class="rot-row">
        <button class="btn" style="width:calc(var(--b)*0.85);height:calc(var(--b)*0.85);font-size:20px" id="rotl-btn" onpointerdown="startCmd('rotl')" onpointerup="stopCmd()" onpointerleave="stopCmd()">↺</button>
        <button class="btn" style="width:calc(var(--b)*0.85);height:calc(var(--b)*0.85);font-size:20px" id="rotr-btn" onpointerdown="startCmd('rotr')" onpointerup="stopCmd()" onpointerleave="stopCmd()">↻</button>
      </div>
    </div>

    <div class="center-panel">
      <div class="tele">
        <div class="tele-card">
          <div class="tele-val" id="alt-display">0 m</div>
          <div class="tele-key">Höhe</div>
        </div>
        <div class="tele-card">
          <div class="tele-val" id="speed-display">0 km/h</div>
          <div class="tele-key">Geschw.</div>
        </div>
        <div class="tele-card">
          <div class="tele-val" id="heading-display">0°</div>
          <div class="tele-key">Richtung</div>
        </div>
      </div>
      <button class="shutdown-btn" id="shutdown-btn" onclick="toggleShutdown()">
        <span class="stop-sq"></span>
        <span id="shutdown-label">Motoren ausschalten</span>
      </button>
      <div class="log" id="log">Bereit</div>
    </div>

    <div class="right-panel">
      <span class="panel-label">Richtung</span>
      <div class="dpad">
        <div class="btn empty"></div>
        <button class="btn" id="fwd-btn" onpointerdown="startCmd('fwd')" onpointerup="stopCmd()" onpointerleave="stopCmd()">▲</button>
        <div class="btn empty"></div>
        <button class="btn" id="left-btn" onpointerdown="startCmd('left')" onpointerup="stopCmd()" onpointerleave="stopCmd()">◀</button>
        <div class="btn empty center-lbl">STOP</div>
        <button class="btn" id="right-btn" onpointerdown="startCmd('right')" onpointerup="stopCmd()" onpointerleave="stopCmd()">▶</button>
        <div class="btn empty"></div>
        <button class="btn" id="back-btn" onpointerdown="startCmd('back')" onpointerup="stopCmd()" onpointerleave="stopCmd()">▼</button>
        <div class="btn empty"></div>
      </div>
    </div>

  </div>
</div>

<script>
  var state = { alt: 0, speed: 0, heading: 0, motors: true, active: null, interval: null };
  var cmds = {
    fwd:  { label:'Vorwärts',  speed:12 },
    back: { label:'Rückwärts', speed:8  },
    left: { label:'Links',     speed:6  },
    right:{ label:'Rechts',    speed:6  },
    up:   { label:'Steigen',   alt:1    },
    down: { label:'Sinken',    alt:-1   },
    rotl: { label:'Drehen L',  rot:-6   },
    rotr: { label:'Drehen R',  rot:6    },
  };

  function startCmd(cmd) {
    if (!state.motors) return;
    stopCmd();
    state.active = cmd;
    var el = document.getElementById(cmd + '-btn');
    if (el) el.classList.add('pressed');
    setLog(cmds[cmd].label + '...');
    tick(cmd);
    state.interval = setInterval(function(){ tick(cmd); }, 120);
  }

  function stopCmd() {
    if (state.active) {
      var el = document.getElementById(state.active + '-btn');
      if (el) el.classList.remove('pressed');
    }
    clearInterval(state.interval);
    state.interval = null;
    state.active = null;
    state.speed = 0;
    updateTele();
    if (state.motors) setLog('Bereit');
  }

  function tick(cmd) {
    var c = cmds[cmd];
    if (c.alt !== undefined) { state.alt = Math.max(0, Math.min(120, state.alt + c.alt)); state.speed = 3; }
    if (c.speed !== undefined) { state.speed = c.speed; }
    if (c.rot !== undefined) { state.heading = ((state.heading + c.rot) % 360 + 360) % 360; }
    updateTele();
  }

  function updateTele() {
    document.getElementById('alt-display').textContent = state.alt + ' m';
    document.getElementById('speed-display').textContent = state.speed + ' km/h';
    document.getElementById('heading-display').textContent = state.heading + '°';
  }

  function toggleShutdown() {
    state.motors = !state.motors;
    stopCmd();
    var btn = document.getElementById('shutdown-btn');
    var lbl = document.getElementById('shutdown-label');
    var ms  = document.getElementById('motor-status');
    if (!state.motors) {
      btn.classList.add('on');
      lbl.textContent = 'Motoren einschalten';
      ms.textContent = 'Gestoppt';
      ms.className = 's-val err';
      state.alt = 0; state.speed = 0;
      updateTele();
      setLog('⚠ Motoren gestoppt');
    } else {
      btn.classList.remove('on');
      lbl.textContent = 'Motoren ausschalten';
      ms.textContent = 'Aktiv';
      ms.className = 's-val ok';
      setLog('Motoren aktiv — Bereit');
    }
  }

  function setLog(msg) { document.getElementById('log').textContent = msg; }

  setInterval(function() {
    var el = document.getElementById('battery');
    var b = parseInt(el.textContent);
    if (state.motors && b > 5) {
      b = Math.max(5, b - 1);
      el.textContent = b + '%';
      el.className = 's-val' + (b < 20 ? ' err' : b < 40 ? ' warn' : ' ok');
    }
  }, 30000);
</script>
